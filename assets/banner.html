<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 300px;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'JetBrains Mono', monospace;
  }

  .banner {
    position: relative;
    width: 1200px;
    height: 300px;
    overflow: hidden;
    background: #0a0a0f;
  }

  /* Radial ambient glow */
  .banner::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 900px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(59,130,246,0.06) 0%, rgba(139,92,246,0.03) 40%, transparent 70%);
    pointer-events: none;
  }

  /* Dot grid */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle, rgba(59,130,246,0.12) 1px, transparent 1px);
    background-size: 24px 24px;
    mask-image: radial-gradient(ellipse 500px 200px at 50% 50%, black 20%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse 500px 200px at 50% 50%, black 20%, transparent 70%);
  }

  /* Horizontal scan lines */
  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(59,130,246,0.015) 2px,
      rgba(59,130,246,0.015) 4px
    );
    pointer-events: none;
  }

  /* Orbital rings behind text */
  .orbital {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 320px;
    height: 320px;
    border-radius: 50%;
    border: 1px solid rgba(59,130,246,0.07);
  }
  .orbital:nth-child(2) {
    width: 480px;
    height: 480px;
    border-color: rgba(139,92,246,0.05);
  }
  .orbital:nth-child(3) {
    width: 640px;
    height: 640px;
    border-color: rgba(59,130,246,0.03);
  }

  /* Node network */
  .node {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(59,130,246,0.5);
    box-shadow: 0 0 6px rgba(59,130,246,0.3);
  }
  .node.purple {
    background: rgba(139,92,246,0.5);
    box-shadow: 0 0 6px rgba(139,92,246,0.3);
  }
  .node.bright {
    background: rgba(59,130,246,0.8);
    box-shadow: 0 0 10px rgba(59,130,246,0.5);
    width: 5px;
    height: 5px;
  }

  /* Connection lines between nodes */
  .connection {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, rgba(59,130,246,0.15), rgba(139,92,246,0.08), transparent);
    transform-origin: left center;
  }

  /* HUD corner brackets */
  .corner {
    position: absolute;
    width: 20px;
    height: 20px;
  }
  .corner-tl { top: 16px; left: 16px; border-top: 1px solid rgba(59,130,246,0.3); border-left: 1px solid rgba(59,130,246,0.3); }
  .corner-tr { top: 16px; right: 16px; border-top: 1px solid rgba(59,130,246,0.3); border-right: 1px solid rgba(59,130,246,0.3); }
  .corner-bl { bottom: 16px; left: 16px; border-bottom: 1px solid rgba(139,92,246,0.3); border-left: 1px solid rgba(139,92,246,0.3); }
  .corner-br { bottom: 16px; right: 16px; border-bottom: 1px solid rgba(139,92,246,0.3); border-right: 1px solid rgba(139,92,246,0.3); }

  /* Side data readouts */
  .readout {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(59,130,246,0.3);
  }
  .readout-left {
    top: 50%;
    left: 28px;
    transform: translateY(-50%);
    text-align: left;
    line-height: 1.8;
  }
  .readout-right {
    top: 50%;
    right: 28px;
    transform: translateY(-50%);
    text-align: right;
    line-height: 1.8;
    color: rgba(139,92,246,0.3);
  }

  /* Gradient horizontal lines */
  .hline {
    position: absolute;
    top: 50%;
    height: 1px;
  }
  .hline-left {
    left: 100px;
    width: 320px;
    background: linear-gradient(90deg, transparent, rgba(59,130,246,0.2) 40%, rgba(59,130,246,0.4));
  }
  .hline-right {
    right: 100px;
    width: 320px;
    background: linear-gradient(270deg, transparent, rgba(139,92,246,0.2) 40%, rgba(139,92,246,0.4));
  }

  /* Central content */
  .center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
  }

  /* Status indicator */
  .status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(0,212,170,0.6);
    margin-bottom: 16px;
  }
  .status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #00d4aa;
    box-shadow: 0 0 8px rgba(0,212,170,0.5);
  }

  /* TITUS text */
  .title {
    font-family: 'Orbitron', 'JetBrains Mono', sans-serif;
    font-weight: 900;
    font-size: 72px;
    letter-spacing: 24px;
    color: #ffffff;
    text-shadow:
      0 0 40px rgba(59,130,246,0.15),
      0 0 80px rgba(139,92,246,0.08);
    margin-bottom: 8px;
    padding-left: 24px; /* compensate for letter-spacing */
  }

  /* Subtle gradient underline */
  .title-line {
    width: 260px;
    height: 1px;
    margin: 0 auto 14px;
    background: linear-gradient(90deg, transparent, #3b82f6 30%, #8b5cf6 70%, transparent);
  }

  /* Subtitle */
  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 8px;
    text-transform: uppercase;
    background: linear-gradient(90deg, #3b82f6, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    padding-left: 8px;
  }

  /* Version tag */
  .version {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.12);
    text-transform: uppercase;
  }

  /* Hex cluster decoration */
  .hex-cluster {
    position: absolute;
    opacity: 0.06;
  }
  .hex {
    position: absolute;
    width: 30px;
    height: 17px;
    background: transparent;
    border: 1px solid #3b82f6;
  }
  .hex::before, .hex::after {
    content: '';
    position: absolute;
    width: 0;
    height: 0;
    left: -1px;
  }
  .hex::before {
    top: -9px;
    border-left: 15px solid transparent;
    border-right: 15px solid transparent;
    border-bottom: 9px solid #3b82f6;
  }
  .hex::after {
    bottom: -9px;
    border-left: 15px solid transparent;
    border-right: 15px solid transparent;
    border-top: 9px solid #3b82f6;
  }

  /* Vertical tick marks */
  .tick-group {
    position: absolute;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .tick {
    width: 12px;
    height: 1px;
    background: rgba(59,130,246,0.15);
  }
  .tick.active {
    background: rgba(59,130,246,0.35);
    width: 18px;
    box-shadow: 0 0 4px rgba(59,130,246,0.2);
  }

  /* Small arc decorators */
  .arc {
    position: absolute;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 1px solid transparent;
  }
  .arc-1 {
    top: 30px;
    left: 140px;
    border-top-color: rgba(59,130,246,0.12);
    border-right-color: rgba(59,130,246,0.08);
    transform: rotate(-30deg);
  }
  .arc-2 {
    bottom: 30px;
    right: 140px;
    border-bottom-color: rgba(139,92,246,0.12);
    border-left-color: rgba(139,92,246,0.08);
    transform: rotate(15deg);
  }
</style>
</head>
<body>
<div class="banner">
  <!-- Atmospheric layers -->
  <div class="grid"></div>
  <div class="scanlines"></div>

  <!-- Orbital rings -->
  <div class="orbital"></div>
  <div class="orbital"></div>
  <div class="orbital"></div>

  <!-- Node network - scattered intelligently -->
  <div class="node" style="top:45px; left:180px;"></div>
  <div class="node purple" style="top:80px; left:260px;"></div>
  <div class="node" style="top:65px; left:350px;"></div>
  <div class="node bright" style="top:120px; left:155px;"></div>

  <div class="node" style="top:240px; left:310px;"></div>

  <div class="node purple" style="top:50px; right:190px;"></div>
  <div class="node" style="top:90px; right:280px;"></div>
  <div class="node bright" style="top:130px; right:170px;"></div>
  <div class="node" style="top:200px; right:230px;"></div>

  <!-- HUD corners -->

  <!-- Left readout -->
  <div class="readout readout-left">

  <div class="readout readout-right">

    memory.linked<br>

  <!-- Tick marks left -->
  <div class="tick-group" style="left:85px; top:80px;">

    <div class="tick"></div>
    <div class="tick active"></div>
    <div class="tick"></div>

  </div>

  <!-- Tick marks right -->
  <div class="tick-group" style="right:85px; top:130px;">
    <div class="tick" style="margin-left:auto;"></div>
    <div class="tick" style="margin-left:auto;"></div>
    <div class="tick active" style="margin-left:auto;"></div>
    <div class="tick" style="margin-left:auto;"></div>
    <div class="tick active" style="margin-left:auto;"></div>
    <div class="tick" style="margin-left:auto;"></div>
  </div>

  <!-- Horizontal gradient lines -->
  <div class="hline hline-left"></div>
  <div class="hline hline-right"></div>

  <!-- Center content -->
  <div class="center">
    <div class="status">
      <div class="status-dot"></div>
      operational
    </div>
    <div class="title">TITUS</div>
    <div class="title-line"></div>
    <div class="subtitle">AI Operating System</div>
  </div>

  <!-- Version -->
  <div class="version">open source &middot; zero dependencies &middot; markdown native</div>
</div>
</body>
</html>
