<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="8"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="75" x2="1200" y2="75" stroke="#1a1a2e" stroke-width="0.5"/>
  <line x1="0" y1="150" x2="1200" y2="150" stroke="#1a1a2e" stroke-width="0.5"/>
  <line x1="0" y1="225" x2="1200" y2="225" stroke="#1a1a2e" stroke-width="0.5"/>
  <line x1="300" y1="0" x2="300" y2="300" stroke="#1a1a2e" stroke-width="0.5"/>
  <line x1="600" y1="0" x2="600" y2="300" stroke="#1a1a2e" stroke-width="0.5"/>
  <line x1="900" y1="0" x2="900" y2="300" stroke="#1a1a2e" stroke-width="0.5"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accent)" rx="1"/>

  <!-- Glow effect behind text -->
  <ellipse cx="600" cy="130" rx="300" ry="80" fill="url(#glow)"/>

  <!-- Main title -->
  <text x="600" y="125" text-anchor="middle" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" letter-spacing="16" fill="white">TITUS</text>

  <!-- Separator line -->
  <rect x="460" y="145" width="280" height="1" fill="url(#accent)" opacity="0.6"/>

  <!-- Subtitle -->
  <text x="600" y="180" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="16" letter-spacing="4" fill="#64748b">AI OPERATING SYSTEM</text>

  <!-- Tagline -->
  <text x="600" y="220" text-anchor="middle" font-family="'SF Pro Text', 'Inter', 'Segoe UI', system-ui, sans-serif" font-size="15" fill="#94a3b8">Identity · Authority · Memory · Delegation · Continuity</text>

  <!-- Version badge -->
  <rect x="545" y="240" width="110" height="24" rx="12" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <text x="600" y="256" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#3b82f6">v1.0 · MIT</text>

  <!-- Corner accents -->
  <path d="M 0 30 L 0 0 L 30 0" stroke="url(#accent)" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 1170 0 L 1200 0 L 1200 30" stroke="url(#accent)" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 0 270 L 0 300 L 30 300" stroke="url(#accent)" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 1170 300 L 1200 300 L 1200 270" stroke="url(#accent)" stroke-width="2" fill="none" opacity="0.4"/>
</svg>
