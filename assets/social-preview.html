<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 640px;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'JetBrains Mono', monospace;
  }

  .card {
    position: relative;
    width: 1280px;
    height: 640px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Large ambient gradient */
  .card::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 1000px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(59,130,246,0.07) 0%, rgba(139,92,246,0.04) 35%, transparent 65%);
  }

  /* Dot grid */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle, rgba(59,130,246,0.08) 1px, transparent 1px);
    background-size: 32px 32px;
    mask-image: radial-gradient(ellipse 600px 350px at 50% 50%, black 15%, transparent 65%);
    -webkit-mask-image: radial-gradient(ellipse 600px 350px at 50% 50%, black 15%, transparent 65%);
  }

  /* Large orbital rings */
  .ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1px solid;
  }
  .ring-1 { width: 300px; height: 300px; border-color: rgba(59,130,246,0.08); }
  .ring-2 { width: 450px; height: 450px; border-color: rgba(139,92,246,0.06); }
  .ring-3 { width: 600px; height: 600px; border-color: rgba(59,130,246,0.04); }
  .ring-4 { width: 800px; height: 800px; border-color: rgba(139,92,246,0.025); }

  /* Stylized T mark */
  .t-mark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 160px;
    height: 160px;
    z-index: 2;
  }
  .t-mark::before {
    content: '';
    position: absolute;
    top: 20px;
    left: 20px;
    right: 20px;
    height: 3px;
    background: linear-gradient(90deg, #3b82f6, #8b5cf6);
    border-radius: 2px;
    box-shadow: 0 0 15px rgba(59,130,246,0.3), 0 0 30px rgba(139,92,246,0.15);
  }
  .t-mark::after {
    content: '';
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 3px;
    height: 120px;
    background: linear-gradient(180deg, #8b5cf6, #3b82f6 60%, rgba(59,130,246,0.2));
    border-radius: 2px;
    box-shadow: 0 0 15px rgba(139,92,246,0.3), 0 0 30px rgba(59,130,246,0.15);
  }

  /* Outer glow around T */
  .t-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
    z-index: 1;
  }

  /* Corner node clusters */
  .node-cluster {
    position: absolute;
    z-index: 3;
  }
  .nc-dot {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(59,130,246,0.4);
    box-shadow: 0 0 6px rgba(59,130,246,0.2);
  }
  .nc-dot.p { background: rgba(139,92,246,0.4); box-shadow: 0 0 6px rgba(139,92,246,0.2); }
  .nc-line {
    position: absolute;
    height: 1px;
    background: rgba(59,130,246,0.1);
    transform-origin: left center;
  }

  /* Text block */
  .content {
    position: relative;
    z-index: 10;
    text-align: center;
    margin-top: 200px;
  }

  .logo-text {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 48px;
    letter-spacing: 18px;
    color: #ffffff;
    text-shadow: 0 0 30px rgba(59,130,246,0.15), 0 0 60px rgba(139,92,246,0.08);
    padding-left: 18px;
    margin-bottom: 10px;
  }

  .logo-line {
    width: 200px;
    height: 1px;
    margin: 0 auto 12px;
    background: linear-gradient(90deg, transparent, #3b82f6 30%, #8b5cf6 70%, transparent);
  }

  .logo-sub {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 300;
    font-size: 12px;
    letter-spacing: 6px;
    text-transform: uppercase;
    background: linear-gradient(90deg, #3b82f6, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    padding-left: 6px;
    margin-bottom: 32px;
  }

  .tagline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    max-width: 500px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* Feature pills at bottom */
  .features {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 16px;
    z-index: 10;
  }
  .feature-pill {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    padding: 6px 14px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px;
    background: rgba(255,255,255,0.02);
  }

  /* HUD corners */
  .corner {
    position: absolute;
    width: 24px;
    height: 24px;
    z-index: 10;
  }
  .c-tl { top: 20px; left: 20px; border-top: 1px solid rgba(59,130,246,0.2); border-left: 1px solid rgba(59,130,246,0.2); }
  .c-tr { top: 20px; right: 20px; border-top: 1px solid rgba(59,130,246,0.2); border-right: 1px solid rgba(59,130,246,0.2); }
  .c-bl { bottom: 20px; left: 20px; border-bottom: 1px solid rgba(139,92,246,0.2); border-left: 1px solid rgba(139,92,246,0.2); }
  .c-br { bottom: 20px; right: 20px; border-bottom: 1px solid rgba(139,92,246,0.2); border-right: 1px solid rgba(139,92,246,0.2); }

  /* GitHub mark */
  .gh-mark {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.12);
    text-transform: uppercase;
    z-index: 10;
  }

  /* Status indicators */
  .status-row {
    position: absolute;
    bottom: 94px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 24px;
    z-index: 10;
  }
  .status-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 8px;
    letter-spacing: 1.5px;
    color: rgba(0,212,170,0.4);
    text-transform: uppercase;
  }
  .s-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(0,212,170,0.5);
    box-shadow: 0 0 6px rgba(0,212,170,0.3);
  }
</style>
</head>
<body>
<div class="card">
  <!-- Background -->
  <div class="grid-bg"></div>

  <!-- Rings -->
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>
  <div class="ring ring-4"></div>

  <!-- T glow -->
  <div class="t-glow"></div>

  <!-- Stylized T mark -->
  <div class="t-mark"></div>

  <!-- Node clusters -->
  <div class="node-cluster" style="top:100px; left:120px;">
    <div class="nc-dot" style="top:0; left:0;"></div>
    <div class="nc-dot p" style="top:20px; left:40px;"></div>
    <div class="nc-dot" style="top:40px; left:10px;"></div>
    <div class="nc-line" style="top:2px; left:4px; width:38px; transform:rotate(28deg);"></div>
    <div class="nc-line" style="top:22px; left:40px; width:32px; transform:rotate(140deg);"></div>
  </div>

  <div class="node-cluster" style="top:130px; right:150px;">
    <div class="nc-dot p" style="top:0; left:30px;"></div>
    <div class="nc-dot" style="top:30px; left:0;"></div>
    <div class="nc-dot" style="top:25px; left:55px;"></div>
    <div class="nc-line" style="top:2px; left:30px; width:35px; transform:rotate(130deg);"></div>
    <div class="nc-line" style="top:32px; left:4px; width:50px; transform:rotate(-5deg);"></div>
  </div>

  <div class="node-cluster" style="bottom:160px; left:180px;">
    <div class="nc-dot" style="top:0; left:20px;"></div>
    <div class="nc-dot p" style="top:25px; left:50px;"></div>
    <div class="nc-dot" style="top:30px; left:0;"></div>
    <div class="nc-line" style="top:2px; left:24px; width:30px; transform:rotate(40deg);"></div>
  </div>

  <div class="node-cluster" style="bottom:140px; right:160px;">
    <div class="nc-dot p" style="top:0; left:0;"></div>
    <div class="nc-dot" style="top:15px; left:45px;"></div>
    <div class="nc-dot" style="top:35px; left:15px;"></div>
    <div class="nc-line" style="top:2px; left:4px; width:42px; transform:rotate(19deg);"></div>
    <div class="nc-line" style="top:17px; left:45px; width:35px; transform:rotate(145deg);"></div>
  </div>

  <!-- HUD corners -->
  <div class="corner c-tl"></div>
  <div class="corner c-tr"></div>
  <div class="corner c-bl"></div>
  <div class="corner c-br"></div>

  <!-- GitHub -->
  <div class="gh-mark">github.com/wrg32786/titus-os</div>

  <!-- Content -->
  <div class="content">
    <div class="logo-text">TITUS</div>
    <div class="logo-line"></div>
    <div class="logo-sub">AI Operating System</div>
    <div class="tagline">Your AI doesn't just answer questions. It operates.</div>
  </div>

  <!-- Status -->
  <div class="status-row">
    <div class="status-item"><div class="s-dot"></div>zero dependencies</div>
    <div class="status-item"><div class="s-dot"></div>markdown native</div>
    <div class="status-item"><div class="s-dot"></div>open source</div>
  </div>

  <!-- Feature pills -->
  <div class="features">
    <div class="feature-pill">15 system docs</div>
    <div class="feature-pill">obsidian vault</div>
    <div class="feature-pill">smart delegation</div>
    <div class="feature-pill">persistent memory</div>
    <div class="feature-pill">auto hooks</div>
  </div>
</div>
</body>
</html>
